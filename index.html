<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JYZ Accesorios | Catálogo</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #007AFF; 
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --ws-color: #25D366;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Header Profesional */
        header {
            background: var(--card-bg);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #d2d2d7;
        }

        header h1 { 
            font-size: 1.5rem; 
            margin: 0; 
            font-weight: 800; 
            letter-spacing: -1px;
            color: var(--primary);
        }
        header p { font-size: 0.85rem; margin: 8px 0 0; color: #86868b; font-weight: 400; }

        /* Categorías */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            scrollbar-width: none;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .categories::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            background: var(--card-bg);
            border: 1px solid #d2d2d7;
            padding: 10px 20px;
            border-radius: 25px;
            white-space: nowrap;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Grid de Productos */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            padding: 12px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .product-info h3 {
            font-size: 0.9rem;
            margin: 0 0 10px 0;
            font-weight: 600;
            line-height: 1.3;
            color: var(--primary);
        }

        .price {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .ws-btn {
            background: var(--ws-color);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .ws-btn:active { transform: scale(0.95); opacity: 0.9; }

        .tag-stock {
            background: #fff2f2;
            color: #ff3b30;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        @media (min-width: 600px) {
            .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>JYZ ACCESORIOS</h1>
    <p>Tecnología, audio y fundas para tu celular</p>
</header>

<div class="categories" id="cat-list">
    <button class="cat-btn active" onclick="filterCat('TODOS', this)">Todos</button>
    <button class="cat-btn" onclick="filterCat('APPLE', this)">Apple</button>
    <button class="cat-btn" onclick="filterCat('SAMSUNG', this)">Samsung</button>
    <button class="cat-btn" onclick="filterCat('FUNDAS', this)">Fundas</button>
    <button class="cat-btn" onclick="filterCat('AUDIO', this)">Audio</button>
    <button class="cat-btn" onclick="filterCat('PERFUMES', this)">Perfumes</button>
</div>

<div class="catalog-grid" id="catalog"></div>

<script>
    // Los precios corresponden a lo que le cobran a sus clientes
    const productos = [
        { p: "Balanza con Recipiente", cat: "VARIOS", pr: 12000, s: 2 },
        { p: "Depilador de Cristal", cat: "PERSONAL", pr: 5000, s: 2 },
        { p: "Auri AKG Tipo C", cat: "SAMSUNG AUDIO", pr: 8000, s: 2 },
        { p: "Bolso Fibras 24 UN", cat: "VARIOS", pr: 15000, s: 1 },
        { p: "Auri Samsung 3.5", cat: "SAMSUNG AUDIO", pr: 5000, s: 3 },
        { p: "Cable Micro USB", cat: "VARIOS", pr: 4000, s: 2 },
        { p: "Combo 5W + Lightning", cat: "APPLE", pr: 18000, s: 1 },
        { p: "Fuente 20W", cat: "APPLE", pr: 14000, s: 1 },
        { p: "Glass Cámara 15 Pro", cat: "APPLE", pr: 5000, s: 3 },
        { p: "Cable C a C", cat: "APPLE", pr: 10000, s: 2 },
        { p: "Cable C a Lightning", cat: "APPLE", pr: 8000, s: 2 },
        { p: "Perfume Árabe", cat: "PERFUMES", pr: 6000, s: 6 },
        { p: "Silicon IPH 13", cat: "FUNDAS", pr: 8000, s: 4 },
        { p: "Silicon IPH 16", cat: "FUNDAS", pr: 10000, s: 3 },
        { p: "Silicon IPH 17 Pro", cat: "FUNDAS", pr: 12000, s: 1 },
        { p: "Silicon A36", cat: "FUNDAS", pr: 8000, s: 2 },
        { p: "Silicon A16", cat: "FUNDAS", pr: 8000, s: 2 }
    ];

    const nroWhatsApp = "5493518565304"; 

    function renderProducts(filter = 'TODOS') {
        const container = document.getElementById('catalog');
        container.innerHTML = "";

        productos.forEach(item => {
            if (filter !== 'TODOS' && !item.cat.includes(filter)) return;

            const card = document.createElement('div');
            card.className = 'product-card';
            
            const msg = encodeURIComponent(`¡Hola JYZ Accesorios! 👋 Me gustaría pedir info y fotos de: ${item.p}`);
            
            card.innerHTML = `
                <div class="product-info">
                    ${item.s <= 1 ? '<div class="tag-stock">¡Último disponible!</div>' : ''}
                    <h3>${item.p}</h3>
                    <div class="price">$ ${item.pr.toLocaleString('es-AR')}</div>
                </div>
                <a href="https://wa.me/${nroWhatsApp}?text=${msg}" class="ws-btn" target="_blank">
                    Consultar e Info 📲
                </a>
            `;
            container.appendChild(card);
        });
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts(cat);
    }

    renderProducts();
</script>

</body>
</html>
